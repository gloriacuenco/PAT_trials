MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  PRETRAIN_PATH: "./pretrained/"
  METRIC_LOSS_TYPE: 'class_aware_triplet'
  IF_LABELSMOOTH: 'on'
  IF_WITH_CENTER: 'no'
  NAME: 'part_attention_vit'
  NO_MARGIN: True
  DEVICE_ID: ('0')
  TRANSFORMER_TYPE: 'vit_base_patch16_224_TransReID'
  STRIDE_SIZE: [16, 16]

INPUT:
  SIZE_TRAIN: [224, 224]
  SIZE_TEST: [224, 224]
  REA:
    ENABLED: False
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]
  LGT: # Local Grayscale Transfomation
    DO_LGT: True
    PROB: 0.5

DATASETS:
  TRAIN: ('UrbanElementsReID',)
  TEST: ('UrbanElementsReID_test',)
  ROOT_DIR: '/kaggle/input/datasets/gloriagcuenco/urban2026/Urban2026'

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 4

SOLVER:
  OPTIMIZER_NAME: 'SGD'
  MAX_EPOCHS: 40
  BASE_LR: 0.001 # 0.0004 for msmt
  IMS_PER_BATCH: 16
  WARMUP_METHOD: 'linear'
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 5
  LOG_PERIOD: 60
  EVAL_PERIOD: 5
  WEIGHT_DECAY:  1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2
  SEED: 1234

TEST:
  EVAL: True
  IMS_PER_BATCH: 32
  RE_RANKING: True
  WEIGHT: "./models/model/part_attention_vit_best.pth"
  NECK_FEAT: 'before'
  FEAT_NORM: True
  TTA: True
  TTA_SCALES: [224, 256, 192]  # standard + zoomed-out + zoomed-in

LOG_ROOT: 'models/' # root of log file
TB_LOG_ROOT: './tb_log/'
LOG_NAME: './model'
